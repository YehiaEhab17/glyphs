name: Build Counter APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4
      
      - name: Build debug APK
        run: gradle assembleDebug -p toys/counter
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      
      - name: Rename APK
        run: cp toys/counter/app/build/outputs/apk/debug/app-debug.apk counter.apk
      
      - name: Generate tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Counter Toy ${{ steps.tag.outputs.tag }}
          body: |
            Auto-built from commit ${{ github.sha }}
            
            ### Install
            Download `counter.apk` and install it on your Nothing Phone (3).
            Enable it in Settings → Glyph → Glyph Toys.
          files: counter.apk
          make_latest: true
